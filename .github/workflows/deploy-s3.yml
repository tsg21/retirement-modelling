name: Deploy app to S3

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build application
        working-directory: app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync app/dist/ s3://${{ vars.S3_BUCKET }}/ --delete

      - name: Set cache-control on index.html
        run: aws s3 cp s3://${{ vars.S3_BUCKET }}/index.html s3://${{ vars.S3_BUCKET }}/index.html --metadata-directive REPLACE --cache-control "max-age=10" --content-type "text/html"

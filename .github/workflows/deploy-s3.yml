name: Deploy app to S3

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build application
        working-directory: app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to production S3
        run: aws s3 sync app/dist/ s3://${{ vars.S3_BUCKET }}/ --delete

      - name: Set cache-control on index.html
        run: aws s3 cp s3://${{ vars.S3_BUCKET }}/index.html s3://${{ vars.S3_BUCKET }}/index.html --metadata-directive REPLACE --cache-control "max-age=10" --content-type "text/html"

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build application
        working-directory: app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy PR preview to S3
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          aws s3 sync app/dist/ s3://${{ vars.S3_PREVIEW_BUCKET }}/${PR_NUMBER}/ --delete
          aws s3 cp s3://${{ vars.S3_PREVIEW_BUCKET }}/${PR_NUMBER}/index.html s3://${{ vars.S3_PREVIEW_BUCKET }}/${PR_NUMBER}/index.html --metadata-directive REPLACE --cache-control "max-age=10" --content-type "text/html"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: http://preview.retirementplanner.timgage.co.uk/${{ github.event.number }}/
        with:
          script: |
            const marker = '<!-- pr-preview-url -->';
            const body = `${marker}\n🔍 Preview available at: ${process.env.PREVIEW_URL}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Remove PR preview from S3
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: aws s3 rm s3://${{ vars.S3_PREVIEW_BUCKET }}/${PR_NUMBER}/ --recursive
